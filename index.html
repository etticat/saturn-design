<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>saturn.design</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #fff; overflow: hidden; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #main {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }
        .head {
            position: fixed;
            pointer-events: none;
            z-index: 10;
            transition: transform 0.6s ease-out;
        }
        .head.from-right {
            right: 0;
            transform: translateX(100%);
        }
        .head.from-left {
            left: 0;
            transform: translateX(-100%) scaleX(-1);
        }
        .head.from-right.peek {
            transform: translateX(20%);
        }
        .head.from-left.peek {
            transform: translateX(-20%) scaleX(-1);
        }
    </style>
</head>
<body>
    <img id="main" src="image.jpg" alt="">
    <script>
        let clicks = 0;
        let lastSpawn = 0;
        const main = document.getElementById('main');

        function spawnHead() {
            const img = document.createElement('img');
            img.src = 'head.png';
            img.className = 'head';

            const fromRight = Math.random() > 0.5;
            img.classList.add(fromRight ? 'from-right' : 'from-left');

            const scale = 1 + Math.random() * 2;
            const baseHeight = 15;
            img.style.height = (baseHeight * scale) + 'vh';

            const top = Math.random() * 80 + 5;
            img.style.top = top + '%';

            document.body.appendChild(img);
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    img.classList.add('peek');
                });
            });
        }

        main.addEventListener('click', () => {
            clicks++;
            if (clicks >= 13) {
                const now = Date.now();
                if (now - lastSpawn >= 2000) {
                    lastSpawn = now;
                    spawnHead();
                }
            }
        });
    </script>
</body>
</html>
